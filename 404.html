<body>
  <script>
    (function () {
      if (!location.hostname.endsWith("github.io")) return;

      var p = location.pathname.replace(/\/+$/, "");
      var parts = p.split("/").filter(Boolean);

      if (parts.length !== 1) return;

      try {
        var raw = localStorage.getItem("vienskarisimajam_usability_test_session_v1");

        if (raw) {
          var data = JSON.parse(raw);

          if (
            data &&
            typeof data === "object" &&
            data.participantId &&
            !data.sessionCompletedAt
          ) {
            return;
          }
        }
      } catch (e) { }

      location.replace(p + "/test" + location.search + location.hash);
    })();
  </script>
  <div id="root"></div>
</body>
